<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1A237E;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#283593;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gem" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D4AF37;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="32" cy="32" r="30" fill="url(#bg)" />
  <!-- Gem diamond shape -->
  <polygon points="32,8 50,24 50,40 32,56 14,40 14,24" fill="url(#gem)" opacity="0.2" />
  <!-- G letter -->
  <text x="32" y="43" font-family="Georgia, serif" font-size="28" font-weight="700" fill="#D4AF37" text-anchor="middle" dominant-baseline="auto">G</text>
  <!-- Small gem accent top -->
  <polygon points="32,14 36,20 28,20" fill="#D4AF37" opacity="0.8" />
</svg>
