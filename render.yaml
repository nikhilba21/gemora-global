databases:
  - name: gemora-db
    plan: free
    databaseName: gemora
    user: gemora_user

services:
  - type: web
    name: gemora-global-2
    runtime: node
    rootDir: backend-node
    buildCommand: npm install
    startCommand: node src/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        value: Gemora@2024
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        value: https://www.gemoraglobal.co
      - key: DATABASE_URL
        fromDatabase:
          name: gemora-db
          property: connectionString
