services:
  - type: web
    name: gemora-global-api
    runtime: node
    rootDir: backend-node
    buildCommand: npm install
    startCommand: node src/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 20
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        value: Gemora@2024
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        value: https://gemora-global.vercel.app
      - key: DATABASE_PATH
        value: /var/data/gemora.db
    disk:
      name: gemora-db
      mountPath: /var/data
      sizeGB: 1
